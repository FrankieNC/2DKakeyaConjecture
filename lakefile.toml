name = "BesicovitchSet"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["BesicovitchSet"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false

[[require]]
name = "mathlib"
scope = "leanprover-community"

[[lean_lib]]
name = "BesicovitchSet"

[[lean_lib]]
name = "ForMathlib"